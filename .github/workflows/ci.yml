name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Generate routes
        run: deno task routes

      - name: Fail if generated routes are stale
        run: git diff --exit-code src/frontend/pages.gen.ts

      - name: Type check
        run: deno task check

      - name: Tests with coverage
        run: deno test --allow-net --allow-read --allow-env --coverage=coverage

      - name: Coverage report
        run: |
          deno coverage coverage
          deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info

  build:
    name: Build validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binary
        run: deno task compile

      - name: Docker build
        run: docker build -t denox:ci .
