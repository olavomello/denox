name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Generate routes
        run: deno task routes

      - name: Fail if generated routes are stale
        run: git diff --exit-code src/frontend/pages.gen.ts

      - name: Type check
        run: deno task check

      - name: Tests with coverage
        # Dummy Stripe keys keep the boot fail-fast satisfied when the
        # project config enables a payment provider; no test calls the
        # live API (NFR-5 — suite green without a Stripe account).
        env:
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
        run: deno test --allow-net --allow-read --allow-env --allow-run=deno --coverage=coverage

      - name: Coverage report
        run: |
          deno coverage coverage
          deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info

  build:
    name: Build validation
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binary
        run: deno task compile

      - name: Docker build
        run: docker build -t denox:ci .
