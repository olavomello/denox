name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Postgres for the gated integration suite. Without TEST_DATABASE_URL
    # those tests self-skip, so this only adds coverage — it never blocks.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: denox
          POSTGRES_PASSWORD: denox
          POSTGRES_DB: denox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U denox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Generate routes
        run: deno task routes

      - name: Fail if generated routes are stale
        run: git diff --exit-code src/frontend/pages.gen.ts

      - name: Type check
        run: deno task check

      # Tasks are the single source of truth for test commands (the
      # coverage task already injects dummy Stripe keys — NFR-5: suite
      # green without a Stripe account regardless of payments.provider).
      - name: Tests with coverage
        env:
          TEST_DATABASE_URL: postgres://denox:denox@localhost:5432/denox_test
        run: deno task coverage

      - name: Coverage lcov
        run: deno task coverage:lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info

  build:
    name: Build validation
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binary
        run: deno task compile

      - name: Docker build
        run: docker build -t denox:ci .
