# Fly.io configuration for Denox.
# Deploy: `deno task deploy fly` (or `fly deploy`).
# Uses the root Dockerfile. Set secrets first:
#   fly secrets set CORS_ORIGIN=https://yourdomain.com

app = "denox"
primary_region = "gru"

[build]
  # Root Dockerfile is used automatically.

[env]
  APP_ENV = "production"
  HOSTNAME = "0.0.0.0"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
