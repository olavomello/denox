services:
  denox:
    build: .
    container_name: denox
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: [
        "CMD-SHELL",
        "deno eval \"const r = await fetch('http://127.0.0.1:8000/api/health'); if (!r.ok) Deno.exit(1);\"",
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
