# Railway configuration for Denox.
# Deploy: `deno task deploy railway` (or `railway up`).
# Builds from the root Dockerfile.
#
# Required variables (set in the Railway dashboard or via CLI):
#   railway variables --set APP_ENV=production --set HOSTNAME=0.0.0.0 \
#     --set CORS_ORIGIN=https://yourdomain.com
# Railway injects PORT automatically; Denox reads it at startup.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
